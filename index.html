<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trading Journal</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">

  <h1>📊 Trading Journal</h1>

  <!-- FORM INPUT -->
  <div class="card form">
    <select id="type">
      <option value="BUY">BUY</option>
      <option value="SELL">SELL</option>
    </select>

    <input id="pair" placeholder="Pair (XAUUSD)">
    <input id="lot" type="number" placeholder="Lot">
    <input id="entry" type="number" placeholder="Entry">
    <input id="tp" type="number" placeholder="TP">
    <input id="sl" type="number" placeholder="SL">

    <button onclick="addTrade()">Tambah</button>
  </div>

  <!-- TOTAL PROFIT -->
  <div class="card total">
    Total Profit
    <h2 id="total">0</h2>
  </div>

  <!-- FILTER -->
  <div class="card filter">
    <button onclick="setFilter('all')">All</button>
    <button onclick="setFilter('day')">Hari</button>
    <button onclick="setFilter('month')">Bulan</button>
  </div>

  <!-- GRAFIK -->
  <div class="card">
    <canvas id="chart"></canvas>
  </div>

  <!-- HISTORY TABLE -->
  <div class="card">
    <table class="table">
      <thead>
        <tr>
          <th>Tanggal</th>
          <th>Type</th>
          <th>Pair</th>
          <th>Lot</th>
          <th>Pips</th>
          <th>Profit</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="history"></tbody>
    </table>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
